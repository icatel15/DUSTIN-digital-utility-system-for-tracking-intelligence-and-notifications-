# Environment variables QDRANT_URL, QDRANT_API_KEY, and OPENAI_API_KEY override these values.
qdrant:
  url: "http://localhost:6333"
  # api_key: set via QDRANT_API_KEY env var for Qdrant Cloud

embeddings:
  provider: "openai"
  model: "text-embedding-3-small"
  # api_key: set via OPENAI_API_KEY env var

collections:
  episodes: "episodes"
  semantic_facts: "semantic_facts"
  procedures: "procedures"

embedding:
  dimensions: 1536
  batch_size: 32

context:
  max_tokens: 50000
  episode_limit: 10
  fact_limit: 20
  procedure_limit: 5
